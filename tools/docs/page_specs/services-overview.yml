id: services-overview

output_path: docs/services.md

front_matter:
  layout: default
  title: Services
  nav_order: 5
  has_children: true

sources:
  - path: services.json
  - path: services/*.json

template: overview

instructions:
  audience: external developers and self-hosters
  include:
    - list of background services as H2 headings with a fitting emoji
    - description and purpose of each service
    - for each service include a summary of key features as a bullet list
    - "link to the detail page for each service: [Read more →](services/fastmail-sse)"
    - environment variables table (name, required, description) for each service if available in source data
  exclude:
    - internal implementation details
    - private hostnames or IP addresses
    - actual credentials or token values

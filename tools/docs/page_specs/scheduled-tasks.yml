id: scheduled-tasks

output_path: docs/scheduled-tasks.md

front_matter:
  layout: default
  title: Scheduled Tasks
  nav_order: 6

sources:
  - path: jobs.json

template: overview
strategy: bundle-scheduled-tasks

instructions:
  audience: external developers and self-hosters
  include:
    - split published scheduled jobs into infrastructure and feature sections
    - explain that the listed tasks run without direct user input
    - for each job show its schedule and a short public-safe summary
  exclude:
    - raw internal prompts
    - internal IDs or session keys
    - authentication credentials or token values

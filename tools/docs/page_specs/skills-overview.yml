id: skills-overview

output_path: docs/skills.md

front_matter:
  layout: default
  title: Skills
  nav_order: 4

sources:
  - path: skills.json

template: overview

instructions:
  audience: external developers
  include:
    - list of available skills
    - description of each skill's purpose
    - how skills are used by agents
  exclude:
    - internal implementation details
    - private hostnames or IP addresses

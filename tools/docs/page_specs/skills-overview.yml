id: skills-overview

output_path: docs/skills.md

front_matter:
  layout: default
  title: Skills
  nav_order: 4
  has_children: true

sources:
  - path: skills.json
  - path: skills/*.json

template: overview
strategy: bundle-skills
chunk_source: "skills/*.json"
chunk_output_dir: docs/skills

instructions:
  audience: external developers
  include:
    - list of available skills as H2 headings with a fitting emoji
    - description of each skill's purpose
    - how skills are used by agents
    - how skills differ from plugins (skills are markdown-defined knowledge, not executable code)
  exclude:
    - internal implementation details
    - private hostnames or IP addresses

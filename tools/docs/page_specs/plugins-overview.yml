id: plugins-overview

output_path: docs/plugins.md

front_matter:
  layout: default
  title: Plugins
  nav_order: 3

sources:
  - path: api-index.json
  - path: plugins/fastmail.json
  - path: plugins/homeassistant-cli.json
  - path: plugins/hass-camera-snapshot.json
  - path: plugins/ics-calendar.json
  - path: plugins/opentable.json
  - path: plugins/opentable-heartbeat.json
  - path: plugins/outlook-calendar.json
  - path: plugins/outlook-mail.json
  - path: plugins/outlook-work-calendar.json
  - path: plugins/weightwatchers.json
  - path: plugins/config-backup.json

template: overview

instructions:
  audience: external developers
  include:
    - "Start with a summary table of all plugins: columns for emoji, plugin name (linked to its section anchor), short description, and tool count"
    - "After the table, create an H2 section for each plugin with a fitting emoji in the heading (e.g. 📧 FastMail, 🏠 Home Assistant, 📅 Outlook Calendar, etc.)"
    - "In each plugin section, list every tool as an H4 heading with the tool name"
    - "Under each tool H4, include the tool's description and a table of its parameters (name, type, description) if parameter info is available in the source data; otherwise just show the description"
  exclude:
    - How It Works section
    - Example Usage section
    - Common Pitfalls section
    - Key Concepts section
    - internal service names
    - authentication credentials or token values
    - private hostnames or IP addresses

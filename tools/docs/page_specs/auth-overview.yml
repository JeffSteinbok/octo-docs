id: auth-overview
output_path: docs/auth/overview.md

sources:
  - path: modules/auth.json
    select:
      - summary
      - endpoints
      - examples
      - limitations
  - path: concepts/architecture.md

template: overview

instructions:
  audience: external developers
  include:
    - overview
    - authentication flow
    - example request
    - common pitfalls
  exclude:
    - internal service names
    - private repo paths

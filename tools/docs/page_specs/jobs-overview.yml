id: jobs-overview

output_path: docs/jobs.md

front_matter:
  layout: default
  title: Scheduled Jobs
  nav_order: 6

sources:
  - path: jobs.json

template: overview

instructions:
  audience: external developers
  include:
    - list of scheduled jobs as H2 headings with a fitting emoji
    - description and purpose of each job
    - schedule information
  exclude:
    - internal service names
    - private hostnames or IP addresses

name: Regenerate documentation

on:
  repository_dispatch:
    types: [docs-update]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout octo-docs
        uses: actions/checkout@v4

      - name: Checkout openclaw
        uses: actions/checkout@v4
        with:
          repository: JeffSteinbok/openclaw
          token: ${{ secrets.OPENCLAW_TOKEN }}
          path: openclaw
          ref: ${{ github.event.client_payload.ref || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate docs
        run: python skills/generate-docs/generate-docs.py --config-dir ./openclaw --output-dir ./docs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git add .doc-hashes.json
          git commit -m "docs: auto-regenerate from openclaw@${GITHUB_EVENT_CLIENT_PAYLOAD_REF:0:7}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push

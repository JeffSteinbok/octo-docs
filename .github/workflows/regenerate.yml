name: Regenerate documentation (bundle-based)

on:
  workflow_dispatch:
    inputs:
      bundle_path:
        description: "Path to the sanitized docs bundle"
        required: true
        default: "./bundle"

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout octo-docs
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/docs/requirements.txt

      - name: Generate docs
        run: |
          python tools/docs/generation/generate_all.py --bundle "${{ inputs.bundle_path }}"
        env:
          DOCS_LLM_PROVIDER: ${{ vars.DOCS_LLM_PROVIDER }}
          DOCS_LLM_MODEL: ${{ vars.DOCS_LLM_MODEL }}
          DOCS_LLM_API_KEY: ${{ secrets.DOCS_LLM_API_KEY }}

      - name: Create branch and open PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python tools/docs/gitops/create_branch.py --bundle-root "${{ inputs.bundle_path }}"
          python tools/docs/gitops/commit_changes.py
          python tools/docs/gitops/open_pr.py --bundle-root "${{ inputs.bundle_path }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

name: Docs Main Pipeline

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/**"

  repository_dispatch:
    types: ["docs-site-ready", "Bundle ready: octo", "bundle-ready"]

  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Artifact name to download from octo"
        required: false
        default: "docs-site"
      artifact_run_id:
        description: "Octo workflow run ID that uploaded the artifact (blank = latest)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Resolve which artifact to download
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
      artifact_run_id: ${{ steps.resolve.outputs.artifact_run_id }}
      skip_receive: ${{ steps.resolve.outputs.skip_receive }}
    steps:
      - name: Resolve inputs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.OCTO_DOCS_BUNDLE_READ_TOKEN }}
        run: |
          latest_successful_run_id() {
            gh run list \
              --repo JeffSteinbok/octo \
              --workflow "Build & Publish Docs" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // ""'
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            # Push to main (e.g. theme change) — just redeploy, no new artifact
            echo "skip_receive=true" >> "$GITHUB_OUTPUT"
            echo "artifact_name=" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RUN_ID="${{ github.event.client_payload.run_id || '' }}"
            if [ -z "$RUN_ID" ]; then
              RUN_ID="$(latest_successful_run_id)"
            fi
            ARTIFACT="${{ github.event.client_payload.artifact_name || 'docs-site' }}"
            echo "skip_receive=false" >> "$GITHUB_OUTPUT"
            echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          else
            # workflow_dispatch
            RUN_ID="${{ inputs.artifact_run_id }}"
            if [ -z "$RUN_ID" ]; then
              RUN_ID="$(latest_successful_run_id)"
            fi
            echo "skip_receive=false" >> "$GITHUB_OUTPUT"
            echo "artifact_name=${{ inputs.artifact_name || 'docs-site' }}" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # 2. Download artifact, copy into docs/, commit to main
  # ---------------------------------------------------------------------------
  receive-docs:
    needs: prepare
    if: needs.prepare.outputs.skip_receive != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download docs-site artifact
        env:
          GH_TOKEN: ${{ secrets.OCTO_DOCS_BUNDLE_READ_TOKEN }}
        run: |
          ARTIFACT_NAME="${{ needs.prepare.outputs.artifact_name }}"
          RUN_ID="${{ needs.prepare.outputs.artifact_run_id }}"
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --repo JeffSteinbok/octo --name "$ARTIFACT_NAME" --dir ./incoming
          else
            gh run download --repo JeffSteinbok/octo --name "$ARTIFACT_NAME" --dir ./incoming
          fi
          echo "Downloaded artifact contents:"
          find ./incoming -type f | head -50

      - name: Copy generated pages into docs/
        run: |
          # Copy all .md files from the artifact into docs/, preserving subdirectory structure.
          # Hand-written files (index.md, 404.md, mail-runtime.md) and theme files
          # (_config.yml, _includes/, _sass/, assets/, CNAME, Gemfile) are NOT overwritten
          # because the artifact only contains generated pages.
          cp -rv ./incoming/*.md docs/ 2>/dev/null || true
          # Copy subdirectories (plugins/, services/, skills/, hooks/, releases/)
          for subdir in plugins services skills hooks releases; do
            if [ -d "./incoming/$subdir" ]; then
              mkdir -p "docs/$subdir"
              cp -rv "./incoming/$subdir/"*.md "docs/$subdir/" 2>/dev/null || true
            fi
          done
          echo "Updated docs/ contents:"
          find docs/ -name '*.md' | sort

      - name: Commit to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "Update generated documentation"
            pushed=false
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push origin main; then
                pushed=true
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Push race on main; retrying (${attempt}/3)..."
                sleep 2
              fi
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push generated docs after retries."
              exit 1
            fi
          fi

  # ---------------------------------------------------------------------------
  # 3. Secret scan (runs on the committed state)
  # ---------------------------------------------------------------------------
  secret-scan:
    needs: receive-docs
    if: always() && (needs.receive-docs.result == 'success' || needs.receive-docs.result == 'skipped')
    uses: ./.github/workflows/secret-scan.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # 4. Deploy to GitHub Pages via Jekyll
  # ---------------------------------------------------------------------------
  deploy:
    needs:
      - prepare
      - receive-docs
      - secret-scan
    if: |
      always() &&
      needs.secret-scan.result == 'success' &&
      (needs.receive-docs.result == 'success' || needs.receive-docs.result == 'skipped')
    uses: ./.github/workflows/jekyll-gh-pages.yml
    with:
      ref: main
    secrets: inherit

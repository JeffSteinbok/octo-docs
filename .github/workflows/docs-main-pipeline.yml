name: Docs Main Pipeline

on:
  push:
    branches: [main]
    paths:
      - "tools/docs/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "tools/docs/**"
      - ".github/workflows/**"
  repository_dispatch:
    types: ["docs-site-ready"]
  workflow_dispatch:
    inputs:
      phase:
        description: "Which part of the docs pipeline to run"
        required: false
        default: "full"
        type: choice
        options:
          - "full"
          - "validate"
          - "generate"
          - "deploy"
      artifact_name:
        description: "Bundle artifact name to download (leave blank to use bundle_path)"
        required: false
        default: "docs-bundle"
      artifact_run_id:
        description: "Octo workflow run ID that uploaded the artifact"
        required: false
        default: ""
      bundle_path:
        description: "Path to an existing bundle on disk when artifact_name is blank"
        required: false
        default: "./bundle"
      regenerate_all:
        description: "Regenerate all pages instead of using changed_pages.json"
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write
  issues: write

concurrency:
  group: docs-main-pipeline
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
      artifact_run_id: ${{ steps.resolve.outputs.artifact_run_id }}
      bundle_path: ${{ steps.resolve.outputs.bundle_path }}
      regenerate_all: ${{ steps.resolve.outputs.regenerate_all }}
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
      run_validation: ${{ steps.resolve.outputs.run_validation }}
      run_generate: ${{ steps.resolve.outputs.run_generate }}
      run_deploy: ${{ steps.resolve.outputs.run_deploy }}
    steps:
      - name: Resolve inputs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.OCTO_DOCS_BUNDLE_READ_TOKEN }}
        run: |
          latest_successful_run_id() {
            local repo="$1"
            local workflow="$2"
            gh run list \
              --repo "$repo" \
              --workflow "$workflow" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // ""'
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "artifact_name=docs-site" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=$(latest_successful_run_id JeffSteinbok/octo 'Build Docs Bundle')" >> "$GITHUB_OUTPUT"
            echo "bundle_path=./bundle" >> "$GITHUB_OUTPUT"
            echo "regenerate_all=true" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=main" >> "$GITHUB_OUTPUT"
            echo "run_validation=true" >> "$GITHUB_OUTPUT"
            echo "run_generate=true" >> "$GITHUB_OUTPUT"
            echo "run_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "artifact_name=docs-site" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=" >> "$GITHUB_OUTPUT"
            echo "bundle_path=./bundle" >> "$GITHUB_OUTPUT"
            echo "regenerate_all=false" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=main" >> "$GITHUB_OUTPUT"
            echo "run_validation=true" >> "$GITHUB_OUTPUT"
            echo "run_generate=false" >> "$GITHUB_OUTPUT"
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            OCTO_RUN_ID="${{ github.event.client_payload.octo_run_id || github.event.client_payload.run_id || '' }}"
            if [ -z "$OCTO_RUN_ID" ]; then
              OCTO_RUN_ID="$(latest_successful_run_id JeffSteinbok/octo 'Build Docs Bundle')"
            fi
            echo "artifact_name=${{ github.event.client_payload.octo_artifact_name || github.event.client_payload.artifact_name || 'docs-site' }}" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=$OCTO_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "bundle_path=./bundle" >> "$GITHUB_OUTPUT"
            echo "regenerate_all=${{ github.event.client_payload.regenerate_all || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=main" >> "$GITHUB_OUTPUT"
            echo "run_validation=true" >> "$GITHUB_OUTPUT"
            echo "run_generate=true" >> "$GITHUB_OUTPUT"
            echo "run_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_name=${{ inputs.artifact_name }}" >> "$GITHUB_OUTPUT"
            echo "artifact_run_id=${{ inputs.artifact_run_id }}" >> "$GITHUB_OUTPUT"
            echo "bundle_path=${{ inputs.bundle_path }}" >> "$GITHUB_OUTPUT"
            echo "regenerate_all=${{ inputs.regenerate_all }}" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=main" >> "$GITHUB_OUTPUT"
            case "${{ inputs.phase }}" in
              full)
                echo "run_validation=true" >> "$GITHUB_OUTPUT"
                echo "run_generate=true" >> "$GITHUB_OUTPUT"
                echo "run_deploy=true" >> "$GITHUB_OUTPUT"
                ;;
              validate)
                echo "run_validation=true" >> "$GITHUB_OUTPUT"
                echo "run_generate=false" >> "$GITHUB_OUTPUT"
                echo "run_deploy=false" >> "$GITHUB_OUTPUT"
                ;;
              generate)
                echo "run_validation=false" >> "$GITHUB_OUTPUT"
                echo "run_generate=true" >> "$GITHUB_OUTPUT"
                echo "run_deploy=false" >> "$GITHUB_OUTPUT"
                ;;
              deploy)
                echo "run_validation=false" >> "$GITHUB_OUTPUT"
                echo "run_generate=false" >> "$GITHUB_OUTPUT"
                echo "run_deploy=true" >> "$GITHUB_OUTPUT"
                ;;
            esac
          fi

  secret-scan:
    needs: prepare
    if: needs.prepare.outputs.run_validation == 'true'
    uses: ./.github/workflows/secret-scan.yml
    secrets: inherit

  generate-docs:
    needs:
      - prepare
      - secret-scan
    if: |
      needs.prepare.outputs.run_generate == 'true' &&
      (
        needs.prepare.outputs.run_validation != 'true' ||
        needs.secret-scan.result == 'success'
      )
    uses: ./.github/workflows/generate-docs.yml
    with:
      artifact_name: ${{ needs.prepare.outputs.artifact_name }}
      artifact_run_id: ${{ needs.prepare.outputs.artifact_run_id }}
    secrets: inherit

  deploy:
    needs:
      - prepare
      - generate-docs
    if: |
      needs.prepare.outputs.run_deploy == 'true' &&
      (
        needs.prepare.outputs.run_generate != 'true' ||
        needs.generate-docs.result == 'success'
      )
    uses: ./.github/workflows/jekyll-gh-pages.yml
    with:
      ref: ${{ needs.prepare.outputs.deploy_ref }}
    secrets: inherit

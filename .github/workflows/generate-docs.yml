name: Receive Rendered Docs

# Rendering now happens upstream in JeffSteinbok/octo, which uploads a
# `docs-site` artifact containing the final Jekyll Markdown pages. This
# workflow simply downloads that artifact, copies the pages into docs/, and
# commits them to main. No Python rendering happens here anymore.

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Name of the octo artifact containing the rendered docs site"
        required: false
        default: "docs-site"
      artifact_run_id:
        description: "Octo run ID that uploaded the rendered site artifact"
        required: false
        default: ""

  workflow_call:
    inputs:
      artifact_name:
        required: false
        type: string
        default: "docs-site"
      artifact_run_id:
        required: false
        type: string
        default: ""
    outputs:
      has_changes:
        description: "Whether the received docs committed changes to main"
        value: ${{ jobs.receive-docs.outputs.has_changes }}

permissions:
  contents: write

jobs:
  receive-docs:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v6

      # Download the rendered site artifact from the private octo repo.
      # Uses OCTO_DOCS_BUNDLE_READ_TOKEN because the artifact lives cross-repo.
      - name: Download rendered site artifact
        run: |
          ARTIFACT_NAME="${{ inputs.artifact_name || 'docs-site' }}"
          RUN_ID="${{ inputs.artifact_run_id }}"
          rm -rf ./incoming
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --repo JeffSteinbok/octo --name "$ARTIFACT_NAME" --dir ./incoming
          else
            gh run download --repo JeffSteinbok/octo --name "$ARTIFACT_NAME" --dir ./incoming
          fi
        env:
          GH_TOKEN: ${{ secrets.OCTO_DOCS_BUNDLE_READ_TOKEN }}

      # Copy the rendered Markdown pages into docs/, leaving Jekyll theme files
      # (_config.yml, _includes/, _sass/, index.md, assets, etc.) and
      # hand-maintained top-level pages (e.g. mail-runtime.md, self-improvement.md)
      # untouched.
      #
      # Pruning strategy:
      #   * Each generated subdirectory (hooks/, plugins/, releases/, services/,
      #     skills/) is fully owned by the generator, so we sync it with --delete
      #     to prune pages that were removed upstream (e.g. a retired skill).
      #   * Top-level Markdown files are copied WITHOUT --delete so generated pages
      #     are refreshed while theme files and hand-maintained pages survive.
      # This deletes stale child pages (the recurring problem) without risking the
      # Jekyll theme or hand-authored top-level content.
      - name: Copy rendered pages into docs/
        run: |
          if [ ! -d ./incoming ] || [ -z "$(ls -A ./incoming 2>/dev/null)" ]; then
            echo "::error::No rendered site content was downloaded."
            exit 1
          fi
          # Sync each generated subdirectory with --delete so retired pages are pruned.
          for dir in ./incoming/*/; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            echo "Syncing generated subdir '$name/' (with prune)"
            mkdir -p "docs/$name"
            rsync -av --delete --exclude='.git' "./incoming/$name/" "docs/$name/"
          done
          # Copy generated top-level files only (no --delete) to preserve theme
          # files and hand-maintained top-level pages.
          rsync -av --exclude='.git' --exclude='*/' ./incoming/ docs/
          rm -rf ./incoming

      - name: Commit to main
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No docs changes to commit."
          else
            # The docs/ tree is fully generated and authoritative, so rather than
            # rebasing (which conflicts when concurrent runs regenerate the same
            # page) we replay our generated changes on top of the latest remote via
            # `reset --soft`. This is conflict-free and always lands our fresh output.
            pushed=false
            for attempt in 1 2 3; do
              git fetch origin main
              git reset --soft origin/main
              git add -A docs/
              if git diff --cached --quiet; then
                echo "Remote already up to date; nothing to push."
                pushed=true
                break
              fi
              git commit -m "Update rendered documentation"
              if git push origin main; then
                pushed=true
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Push race on main; retrying (${attempt}/3)..."
                sleep 2
              fi
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push received docs after retries."
              exit 1
            fi
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

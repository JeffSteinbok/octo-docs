name: Generate Public Docs

on:
  workflow_dispatch:
    inputs:
      bundle_path:
        description: "Path to the sanitized docs bundle"
        required: true
        default: "./bundle"
      regenerate_all:
        description: "Regenerate all pages (ignore changed_pages.json)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    env:
      DOCS_LLM_PROVIDER: ${{ vars.DOCS_LLM_PROVIDER }}
      DOCS_LLM_MODEL: ${{ vars.DOCS_LLM_MODEL }}
      DOCS_LLM_API_KEY: ${{ secrets.DOCS_LLM_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r tools/docs/requirements.txt

      - name: Generate docs
        run: |
          EXTRA_FLAGS=""
          if [ "${{ inputs.regenerate_all }}" = "true" ]; then
            EXTRA_FLAGS="--all"
          fi
          python tools/docs/generation/generate_all.py \
            --bundle "${{ inputs.bundle_path }}" \
            $EXTRA_FLAGS

      - name: Create branch, commit, and open PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python tools/docs/gitops/create_branch.py --bundle-root "${{ inputs.bundle_path }}"
          python tools/docs/gitops/commit_changes.py
          python tools/docs/gitops/open_pr.py --bundle-root "${{ inputs.bundle_path }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

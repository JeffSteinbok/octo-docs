name: Receive Rendered Docs

# Rendering now happens upstream in JeffSteinbok/octo, which uploads a
# `docs-site` artifact containing the final Jekyll Markdown pages. This
# workflow simply downloads that artifact, copies the pages into docs/, and
# commits them to main. No Python rendering happens here anymore.

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Name of the octo artifact containing the rendered docs site"
        required: false
        default: "docs-site"
      artifact_run_id:
        description: "Octo run ID that uploaded the rendered site artifact"
        required: false
        default: ""

  workflow_call:
    inputs:
      artifact_name:
        required: false
        type: string
        default: "docs-site"
      artifact_run_id:
        required: false
        type: string
        default: ""
    outputs:
      has_changes:
        description: "Whether the received docs committed changes to main"
        value: ${{ jobs.receive-docs.outputs.has_changes }}

permissions:
  contents: write

jobs:
  receive-docs:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      # Download the rendered site artifact from the private octo repo.
      # Uses OCTO_DOCS_BUNDLE_READ_TOKEN because the artifact lives cross-repo.
      - name: Download rendered site artifact
        run: |
          ARTIFACT_NAME="${{ inputs.artifact_name || 'docs-site' }}"
          RUN_ID="${{ inputs.artifact_run_id }}"
          rm -rf ./incoming
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --repo JeffSteinbok/octo --name "$ARTIFACT_NAME" --dir ./incoming
          else
            gh run download --repo JeffSteinbok/octo --name "$ARTIFACT_NAME" --dir ./incoming
          fi
        env:
          GH_TOKEN: ${{ secrets.OCTO_DOCS_BUNDLE_READ_TOKEN }}

      # Copy the rendered Markdown pages into docs/, leaving Jekyll theme files
      # (_config.yml, _includes/, _sass/, index.md, assets, etc.) untouched.
      - name: Copy rendered pages into docs/
        run: |
          if [ ! -d ./incoming ] || [ -z "$(ls -A ./incoming 2>/dev/null)" ]; then
            echo "::error::No rendered site content was downloaded."
            exit 1
          fi
          rsync -av --exclude='.git' ./incoming/ docs/
          rm -rf ./incoming

      - name: Commit to main
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No docs changes to commit."
          else
            git commit -m "Update rendered documentation"
            pushed=false
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push origin main; then
                pushed=true
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Push race on main; retrying (${attempt}/3)..."
                sleep 2
              fi
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push received docs after retries."
              exit 1
            fi
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

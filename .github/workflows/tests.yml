name: Tests

on:
  pull_request:
    paths:
      - "tools/docs/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r tools/docs/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tools/docs/tests/ -v
